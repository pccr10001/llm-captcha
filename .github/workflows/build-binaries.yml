name: Build Client and Server Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-server:
    name: Build Server (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - name: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build server binary
        run: |
          mkdir -p dist/release
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" \
            -o dist/release/llm-catpcha-server-${{ matrix.name }}${{ matrix.ext }} .

      - name: Upload server package artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-package-${{ matrix.name }}
          path: dist/release/llm-catpcha-server-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  build-client:
    name: Build Client (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: linux-appimage
            arch: x64
            output_ext: AppImage
          - name: macos-amd64
            runner: macos-latest
            target: macos-dmg
            arch: x64
            output_ext: dmg
          - name: macos-arm64
            runner: macos-latest
            target: macos-dmg
            arch: arm64
            output_ext: dmg
          - name: windows-amd64
            runner: windows-latest
            target: windows-portable
            arch: x64
            output_ext: exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Linux AppImage
        if: matrix.target == 'linux-appimage'
        working-directory: client
        run: >
          npx --yes electron-builder
          --linux AppImage
          --${{ matrix.arch }}
          --publish never
          --config.directories.output=../dist/client
          --config.productName=llm-captcha-client
          --config.appId=com.pccr10001.llm-catpcha.client

      - name: Build macOS DMG
        if: matrix.target == 'macos-dmg'
        working-directory: client
        run: >
          npx --yes electron-builder
          --mac dmg
          --${{ matrix.arch }}
          --publish never
          --config.directories.output=../dist/client
          --config.productName=llm-captcha-client
          --config.appId=com.pccr10001.llm-catpcha.client

      - name: Build Windows portable EXE
        if: matrix.target == 'windows-portable'
        working-directory: client
        run: >
          npx --yes electron-builder
          --win portable
          --${{ matrix.arch }}
          --publish never
          --config.directories.output=../dist/client
          --config.productName=llm-captcha-client
          --config.appId=com.pccr10001.llm-catpcha.client

      - name: Prepare client release asset (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          file="$(find dist/client -maxdepth 2 -type f -name "*.${{ matrix.output_ext }}" | head -n1)"
          if [[ -z "${file}" ]]; then
            echo "No output file with extension .${{ matrix.output_ext }} found in dist/client"
            exit 1
          fi
          cp "$file" "dist/release/llm-captcha-client-${{ matrix.name }}.${{ matrix.output_ext }}"

      - name: Prepare client release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          $file = Get-ChildItem -Path dist/client -Recurse -File -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $file) {
            throw "No output file with extension .exe found in dist/client"
          }
          Copy-Item -Path $file.FullName -Destination "dist/release/llm-captcha-client-${{ matrix.name }}.exe" -Force

      - name: Upload client package artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-package-${{ matrix.name }}
          path: dist/release/llm-captcha-client-${{ matrix.name }}.${{ matrix.output_ext }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-client

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-package-*"
          path: dist/release
          merge-multiple: true

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber
          else
            args=(release create "$tag" dist/release/* --title "$tag" --generate-notes)
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi
